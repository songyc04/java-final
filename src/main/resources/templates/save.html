<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 작성</title>
    <style>
      body {
        font-family: "Noto Sans KR", sans-serif;
        background-color: #f8f9fa;
        margin: 0;
        padding: 40px 20px;
        display: flex;
        justify-content: center;
      }
      .form-container {
        background-color: #ffffff;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 600px;
      }
      .form-container h2 {
        margin-top: 0;
        margin-bottom: 20px;
        color: #333333;
        border-bottom: 2px solid #007bff;
        padding-bottom: 10px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #495057;
      }
      .form-group input[type="text"],
      .form-group input[type="password"],
      .form-group textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ced4da;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 14px;
      }
      .form-group textarea {
        resize: vertical;
        min-height: 200px;
      }
      .form-group input:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: #007bff;
        box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
      }
      .btn-group {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }
      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      .btn-submit {
        background-color: #007bff;
        color: white;
      }
      .btn-submit:hover {
        background-color: #0056b3;
      }
      .btn-cancel {
        background-color: #6c757d;
        color: white;
        text-decoration: none;
        text-align: center;
        line-height: 20px;
      }
      .btn-cancel:hover {
        background-color: #5a6268;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h2>새 글 작성</h2>
      <!-- Spring Boot 컨트롤러의 @PostMapping("/board/write") 등과 매핑 시켜주면 돼 -->
      <form action="/board/save" method="post">
        <!-- 글쓴이 입력 -->
        <div class="form-group">
          <label for="writer">글쓴이</label>
          <input
            type="text"
            id="writer"
            name="boardWriter"
            placeholder="이름을 입력하세요"
            required
          />
        </div>

        <!-- 비밀번호 입력 -->
        <div class="form-group">
          <label for="password">게시글 비밀번호</label>
          <input
            type="password"
            id="password"
            name="boardPass"
            placeholder="비밀번호를 입력하세요"
            required
          />
        </div>

        <!-- 제목 입력 -->
        <div class="form-group">
          <label for="title">제목</label>
          <input
            type="text"
            id="title"
            name="boardTitle"
            placeholder="제목을 입력하세요"
            required
          />
        </div>

        <!-- 내용 입력 -->
        <div class="form-group">
          <label for="content">내용</label>
          <textarea
            id="content"
            name="boardContent"
            placeholder="내용을 작성해주세요"
            required
          ></textarea>
        </div>

        <!-- 버튼 영역 -->
        <div class="btn-group">
          <a href="/board/list" class="btn btn-cancel">취소</a>
          <button type="submit" class="btn btn-submit">등록하기</button>
        </div>
      </form>
    </div>
  </body>
</html>
